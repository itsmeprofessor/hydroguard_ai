# ============================================================
#  HydroGuard-AI — Docker Compose v3.0
#  Dev:  docker compose up
#  Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hydroguard-db
    environment:
      POSTGRES_USER:     hydroguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
      POSTGRES_DB:       hydroguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydroguard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (rate limiting + WS connection state) ───────────
  redis:
    image: redis:7-alpine
    container_name: hydroguard-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Main API ──────────────────────────────────────────────
  hydroguard-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: hydroguard-api
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=false
      - DATABASE_URL=postgresql://hydroguard:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/hydroguard
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE-ME-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-changeme-set-in-env}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,http://localhost:5500}
      - HYBRID_WARMUP=true
      - HYBRID_WARMUP_ROWS=14
      - HYBRID_WARMUP_CSV=backend/data/pakistan_weather_2000_2024.csv
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/saved_models:/app/backend/saved_models
      - ./backend/logs:/app/backend/logs
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hydroguard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend/web_dashboard/admin_dashboard:/usr/share/nginx/html:ro
    depends_on:
      - hydroguard-api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
