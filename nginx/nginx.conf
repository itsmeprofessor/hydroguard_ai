# ============================================================
#  HydroGuard-AI — Nginx Configuration v3.2
#
#  HTTPS / TLS:
#    Place fullchain.pem + privkey.pem in nginx/certs/ before
#    starting the stack.  The HTTPS server block is active below.
#    Generate a self-signed cert for local dev:
#      mkdir -p nginx/certs
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout nginx/certs/privkey.pem \
#        -out nginx/certs/fullchain.pem \
#        -subj "/CN=localhost"
#    For production: use Let's Encrypt / Certbot.
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ── Rate limiting zones ───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_zone:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=predict_zone:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m     rate=200r/m;

    # ── Gzip compression ─────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;

    # ── Upstream API ─────────────────────────────────────────
    upstream hydroguard_api {
        server hydroguard-api:8000;
        keepalive 32;
    }

    # ── HTTP server ───────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers (applied even over HTTP)
        add_header X-Frame-Options        "DENY"          always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # Redirect all HTTP → HTTPS (cert renewal path is excluded by the
        # HTTPS server's location block for /.well-known/acme-challenge/).
        return 301 https://$host$request_uri;

        # WebSocket — must set Upgrade headers
        location /ws/ {
            proxy_pass         http://hydroguard_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Auth endpoints — strict brute-force protection
        location ~ ^/auth/(login|register) {
            limit_req        zone=auth_zone burst=3 nodelay;
            limit_req_status 429;
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prediction endpoints — per-IP rate limit
        location ~ ^/predict {
            limit_req        zone=predict_zone burst=10 nodelay;
            limit_req_status 429;
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # General API routes
        location ~ ^/(anomalies|analytics|risk-map|train|health|auth|model|docs|redoc|openapi\.json|cities|weather|drift|database) {
            limit_req        zone=api_zone burst=50 nodelay;
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # /static/ — admin dashboard JSX/CSS/JS files served by FastAPI's
        # StaticFiles mount at /static/. MUST come before the generic catch-all
        # so nginx doesn't serve index.html instead of the real JSX files.
        location /static/ {
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /frontend and /dashboard — admin dashboard SPA entry points
        # Pattern uses (/...)? so sub-paths like /dashboard/cities also work.
        location ~ ^/(frontend|dashboard)(/.*)?$ {
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Citizen web app — all /citizen/* requests go to FastAPI StaticFiles
        location /citizen {
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin dashboard index.html — catch-all (only for paths not matched above)
        # The actual JSX/CSS assets come from /static/ which proxies to FastAPI.
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────
    # Requires certs in nginx/certs/ — see header comment for generation.
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options        "DENY"          always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:; img-src 'self' data:;" always;

        # Let's Encrypt ACME challenge (cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /ws/ {
            proxy_pass         http://hydroguard_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location ~ ^/auth/(login|register) {
            limit_req zone=auth_zone burst=3 nodelay; limit_req_status 429;
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(api/v2/cities/.*/predict|predict) {
            limit_req zone=predict_zone burst=10 nodelay; limit_req_status 429;
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location ~ ^/(anomalies|analytics|risk-map|train|health|auth|model|docs|redoc|openapi\.json|cities|weather|drift|database|api) {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 120s;
        }

        location /static/ {
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/(frontend|dashboard)(/.*)?$ {
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /citizen {
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            root /usr/share/nginx/html; expires 7d;
            add_header Cache-Control "public, immutable"; access_log off;
        }

        location / {
            root /usr/share/nginx/html; index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
