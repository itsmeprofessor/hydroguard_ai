upstream hydroguard_api {
    server hydroguard-api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production
    # return 301 https://$host$request_uri;

    # ── WebSocket endpoints — must proxy with Upgrade headers ──
    location /ws/ {
        proxy_pass         http://hydroguard_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://hydroguard_api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Direct API routes (no /api prefix) ─────────────────────
    location ~ ^/(predict|anomalies|analytics|risk-map|train|health|auth|model|docs|redoc|openapi.json) {
        proxy_pass         http://hydroguard_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Dashboard static files ─────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /ws/ {
        proxy_pass         http://hydroguard_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    location ~ ^/(predict|anomalies|analytics|risk-map|train|health|auth|model|docs|redoc|openapi.json) {
        proxy_pass         http://hydroguard_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
