# ============================================================
#  HydroGuard-AI — Nginx Configuration v3.3
#
#  HTTP (port 80):  Serves Flutter web app + proxies API.
#                   No HTTPS redirect — works without certs.
#
#  HTTPS (port 443): Optional. Requires certs in nginx/certs/.
#    Generate self-signed for local dev:
#      mkdir -p nginx/certs
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout nginx/certs/privkey.pem \
#        -out nginx/certs/fullchain.pem \
#        -subj "/CN=localhost"
#    For production: use Let's Encrypt / Certbot.
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ── Rate limiting zones ───────────────────────────────────
    # All zones key on $binary_remote_addr (source IP, not session).
    # Clients behind shared NAT (office/university) share the same quota.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=predict_zone:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m     rate=200r/m;

    # ── Gzip compression ─────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;

    # ── Upstream API ─────────────────────────────────────────
    upstream hydroguard_api {
        server hydroguard-api:8000;
        keepalive 32;
    }

    # ── HTTP server (serves Flutter app directly, no redirect) ─
    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options        "DENY"          always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # WebSocket — must set Upgrade headers
        location /ws/ {
            proxy_pass         http://hydroguard_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            # 86400 s = 24 h: WebSocket connections must stay open for real-time push.
            # Standard proxy timeouts (~60 s) would silently drop idle connections.
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Auth endpoints — strict brute-force protection
        location ~ ^/auth/(login|register) {
            limit_req        zone=auth_zone burst=3 nodelay;
            limit_req_status 429;
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prediction endpoints — per-IP rate limit
        location ~ ^/(api/v2/cities/.*/predict|predict) {
            limit_req        zone=predict_zone burst=10 nodelay;
            limit_req_status 429;
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # All API routes — proxied to FastAPI backend
        location ~ ^/(anomalies|analytics|risk-map|train|health|auth|model|docs|redoc|openapi\.json|cities|weather|drift|database|api) {
            limit_req        zone=api_zone burst=50 nodelay;
            proxy_pass       http://hydroguard_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 120 s: city model training triggers (/cities/{city}/train) can take up
            # to 90 s; this headroom prevents spurious 504 Gateway Timeout.
            proxy_read_timeout 120s;
        }

        # Flutter web app — SPA catch-all
        # try_files handles client-side routing (GoRouter HTML5 history mode)
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # ── HTTPS server (optional — requires certs in nginx/certs/) ─
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # Certs are mounted read-only from ./nginx/certs/ on the host.
        # To renew: update files on host, then: docker compose restart nginx
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options        "DENY"          always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        # CSP for Flutter web + CanvasKit CDN + OpenStreetMap tiles + service worker.
        # 'unsafe-inline' and 'unsafe-eval' are required by Flutter CanvasKit WASM
        # rendering and OSM tile loading — intentional, not a security oversight.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: https: http:; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://tile.openstreetmap.org; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self' blob:;" always;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /ws/ {
            proxy_pass         http://hydroguard_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            # 86400 s = 24 h: WebSocket connections must stay open for real-time push.
            # Standard proxy timeouts (~60 s) would silently drop idle connections.
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location ~ ^/auth/(login|register) {
            limit_req zone=auth_zone burst=3 nodelay; limit_req_status 429;
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(api/v2/cities/.*/predict|predict) {
            limit_req zone=predict_zone burst=10 nodelay; limit_req_status 429;
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location ~ ^/(anomalies|analytics|risk-map|train|health|auth|model|docs|redoc|openapi\.json|cities|weather|drift|database|api) {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://hydroguard_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 120 s: city model training triggers (/cities/{city}/train) can take up
            # to 90 s; this headroom prevents spurious 504 Gateway Timeout.
            proxy_read_timeout 120s;
        }

        # Flutter static assets — long cache for immutable hashed filenames
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|wasm)$ {
            root /usr/share/nginx/html;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
