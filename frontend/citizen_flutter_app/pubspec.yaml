name: hydroguard_citizen
description: HydroGuard AI – Enterprise Flood Intelligence & Emergency Management Platform
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking & HTTP
  dio: ^5.4.3
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.2

  # Routing
  go_router: ^13.2.4

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

  # Maps (OpenStreetMap)
  # latlong2 0.9.1 uses import 'package:latlong2/latlong.dart' (NOT latlong2.dart)
  flutter_map: ^6.2.0
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.68.0

  # Animations & UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Date / formatting
  intl: ^0.19.0

  # Fonts & Icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utilities
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
