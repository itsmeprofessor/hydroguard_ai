<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1440, initial-scale=1"/>
  <title>HydroGuard AI — Cloudburst &amp; Flash Flood Detection</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2300c6ff'/%3E%3Cstop offset='1' stop-color='%230072ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M16 2 L28 8 L28 18 C28 24 22 29 16 30 C10 29 4 24 4 18 L4 8 Z' fill='url(%23g)'/%3E%3Cellipse cx='16' cy='20' rx='4' ry='6' fill='white' opacity='0.9'/%3E%3C/svg%3E"/>

  <link rel="stylesheet" href="/static/styles.css"/>

  <style>
    /* Boot-screen shown while JS loads; React will clear #root on mount */
    #boot {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: oklch(0.08 0.01 250);
      gap: 14px; color: oklch(0.55 0.01 250);
      font-family: 'Geist Mono', monospace; font-size: 12px;
    }
    #boot .dot-spin {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid oklch(0.28 0.02 250);
      border-top-color: oklch(0.72 0.14 210);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* On-screen error box — hidden until an error fires */
    #err-box {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: #a00; color: #fff; padding: 16px 20px;
      font-family: 'Geist Mono', monospace; font-size: 12px;
      line-height: 1.7; z-index: 99999;
      white-space: pre-wrap; max-height: 70vh; overflow: auto;
      border-bottom: 2px solid #f66;
    }
    #err-box summary { font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  </style>
</head>
<body>

  <!-- React mounts here; #boot is replaced automatically on first render -->
  <div id="root">
    <div id="boot">
      <div class="dot-spin"></div>
      <span>Loading HydroGuard AI…</span>
    </div>
  </div>

  <!-- Visible error panel (shown on JS error without needing DevTools) -->
  <div id="err-box"></div>

  <!-- ── 1. Framework (sync) ── -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"
          crossorigin="anonymous"></script>

  <!-- ── 2. Plain JS API layer (sync, no JSX) ── -->
  <script src="/static/api.js"></script>

  <!-- ── 3. Sequential JSX loader ──────────────────────────────────────────
       Babel Standalone's built-in external-script loader can fire out-of-order
       when files are fetched concurrently. This loader fetches → transforms →
       evals each file strictly in sequence so every export is on window before
       the next file runs.
  ─────────────────────────────────────────────────────────────────────────── -->
  <script>
  (function () {
    'use strict';

    var JSX_SCRIPTS = [
      '/static/components.jsx',
      '/static/viz.jsx',
      '/static/screens/landing-auth.jsx',
      '/static/screens/dashboard.jsx',
      '/static/screens/cloudburst-flood.jsx',
      '/static/screens/others.jsx',
      // ── v3.1: city-specific hybrid model UI (overrides global screens) ──
      '/static/screens/screens.jsx',
      '/static/app.jsx',
    ];

    /* Show a readable error on screen (no DevTools needed) */
    function showError(title, detail) {
      var box = document.getElementById('err-box');
      box.innerHTML =
        '<summary>⚠ ' + escHtml(title) + '</summary>' +
        '<pre style="margin:0;font-size:11px;opacity:0.9">' + escHtml(detail) + '</pre>';
      box.style.display = 'block';
      console.error(title, detail);
    }
    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* Fetch one file, transform with Babel, execute in global scope */
    function execScript(src) {
      return fetch(src)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + src);
          return r.text();
        })
        .then(function (code) {
          var out;
          try {
            out = Babel.transform(code, {
              presets: ['react'],  /* classic runtime — uses global React */
              filename: src,
            });
          } catch (babelErr) {
            throw new Error('Babel transform failed in ' + src + ':\n' + babelErr.message);
          }
          try {
            // new Function runs in global scope; window.X assignments work correctly
            // eslint-disable-next-line no-new-func
            (new Function(out.code))();
          } catch (runErr) {
            throw new Error('Runtime error in ' + src + ':\n' + runErr.message + '\n' + (runErr.stack || ''));
          }
        });
    }

    /* Load all scripts sequentially (each awaits the previous) */
    function loadAll(idx) {
      if (idx >= JSX_SCRIPTS.length) return;  /* app.jsx already called ReactDOM.createRoot */
      execScript(JSX_SCRIPTS[idx])
        .then(function () { loadAll(idx + 1); })
        .catch(function (err) {
          showError(
            'Failed to load ' + JSX_SCRIPTS[idx],
            err.message
          );
        });
    }

    /* Wait until CDN scripts are ready (they're sync, so DOMContentLoaded is sufficient) */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () { loadAll(0); });
    } else {
      loadAll(0);
    }
  }());
  </script>
</body>
</html>
